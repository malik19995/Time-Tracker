name: app
description: aidhere Time Tracker

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  bloc: ^9.2.0
  bloc_test: ^10.0.0
  camera: ^0.12.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  fluttertoast: ^9.0.0
  freezed_annotation: ^3.1.0
