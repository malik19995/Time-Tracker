  google_fonts: ^8.0.2
  hydrated_bloc: ^10.1.1
  intl: ^0.20.2
  json_annotation: ^4.11.0
  logger: ^2.6.2
  mocktail: ^1.0.4
  path_provider: ^2.1.5

dev_dependencies:
  build_runner: ^2.12.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0

  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.0

flutter_icons:
  android: true
